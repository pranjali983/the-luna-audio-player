<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Music</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --shadow: #a3b1c6;
            --light: #ffffff;
            --accent: #6d5dfc;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: #444;
        }

        .player {
            width: 300px;
            padding: 30px;
            border-radius: 40px;
            background: var(--bg);
            box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--light);
            text-align: center;
        }

        .disc {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 30px;
            background: linear-gradient(145deg, #f0f0f0, #cacaca);
            box-shadow: 5px 5px 10px var(--shadow), -5px -5px 10px var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .disc::after {
            content: '';
            width: 40px;
            height: 40px;
            background: var(--bg);
            border-radius: 50%;
            box-shadow: inset 3px 3px 6px var(--shadow), inset -3px -3px 6px var(--light);
        }

        .playing .disc {
            animation: rotate 5s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h2 { margin: 10px 0 5px; font-size: 1.2rem; }
        p { margin: 0 0 25px; font-size: 0.9rem; opacity: 0.6; }

        .controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--bg);
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            color: #666;
            transition: 0.2s;
        }

        .btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--light);
            color: var(--accent);
        }

        .slider {
            width: 100%;
            height: 6px;
            background: var(--bg);
            border-radius: 10px;
            box-shadow: inset 2px 2px 5px var(--shadow), inset -2px -2px 5px var(--light);
            margin: 30px 0;
            appearance: none;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 15px;
            height: 15px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="player" id="mainPlayer">
        <div class="disc"></div>
        
        <h2>Midnight City</h2>
        <p>M83 • Dream Pop</p>

        <input type="range" class="slider" value="30">

        <div class="controls">
            <button class="btn">⏮</button>
            <button class="btn" onclick="togglePlay(this)" style="font-size: 1.5rem;">▶</button>
            <button class="btn">⏭</button>
        </div>
    </div>

    <script>
        let isPlaying = false;
        function togglePlay(btn) {
            const player = document.getElementById('mainPlayer');
            isPlaying = !isPlaying;
            
            if(isPlaying) {
                player.classList.add('playing');
                btn.innerText = '⏸';
            } else {
                player.classList.remove('playing');
                btn.innerText = '▶';
            }
        }
    </script>
</body>
</html>
